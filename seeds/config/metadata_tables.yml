version: 2

seeds:
  - name: metadata_tables
    config:
      database: edbi_teamg01
      schema: config
      meta:
        contract:
          enforced: true
    columns:
      - name: source_name
        data_type: string
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
      - name: subfolder
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: file_format
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['csv', 'parquet', 'json']
      - name: date_pattern
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: natural_key
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: active
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null
