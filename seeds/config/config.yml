version: 2

seeds:
  - name: metadata_tables
    config:
      catalog: edbi_teamg01
      schema: config
      meta:
        contract:
          enforced: true
    columns:
      - name: source_name
        data_type: string
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
      - name: subfolder
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: file_format
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['csv', 'parquet', 'json']
      - name: date_pattern
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: natural_key
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: active
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null
  - name: metadata_columns
    config:
      catalog: edbi_teamg01
      schema: config
      meta:
        contract:
          enforced: true
    columns:
      - name: source_name
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('metadata_tables')
                field: source_name
      - name: source_column
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: target_column
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: data_type
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['STRING', 'INTEGER', 'BIGINT', 'DOUBLE', 'BOOLEAN', 'DATE', 'TIMESTAMP', 'DATETIME']
      - name: nullable
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: active
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null
