version: 2

seeds:
  - name: public_holidays
    description: "Singapore public holidays"
    columns:
      - name: holiday_date
        description: "The date of the public holiday or in-lieu day."
        tests:
          - not_null
          - unique
      - name: holiday_name
        description: "Name of the public holiday or in-lieu description."
        tests:
          - not_null
  - name: court_event_type_mapping
    description: "Mapping of detailed court event type to grouped court event type"
    columns:
      - name: court_event_type
        description: "Name of detailed court event type"
        tests:
          - not_null
          - unique
      - name: grouped_court_event_type
        description: "Name of grouped court event type"
        tests:
          - not_null
