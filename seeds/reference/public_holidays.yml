version: 2

seeds:
  - name: public_holidays
    description: >
      Singapore public holidays
    columns:
      - name: holiday_date
        description: "The date of the public holiday or in-lieu day."
        tests:
          - not_null
          - unique
      - name: holiday_name
        description: "Name of the public holiday or in-lieu description."
        tests:
          - not_null
