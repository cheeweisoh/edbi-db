version: 2

models:
  - name: court_case_workload_distribution
    description: "Fact/metric model for workload distribution by case and officer"
    columns:
      - name: assigned_officer_id
        description: "Officer identifier assigned to the case"
      - name: assigned_officer_name
        description: "Name of the officer assigned to the case"
      - name: officer_cluster
        description: "Officer cluster for categorization"
      - name: officer_team
        description: "Officer team for categorization"
      - name: case_status
        description: "Current status of the case"
      - name: first_mention_date
        description: "Date of first mention of the case in court"
      - name: case_disposition_date
        description: "Date when the case was disposed"
      - name: case_complexity
        description: "Assigned complexity category for the case"
