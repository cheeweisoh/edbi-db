version: 2

models:
  - name: case_officer_workload
    description: "Metric model for workload distribution by case and officer"
    columns:
      - name: assigned_officer_name
        description: "Name of the officer assigned to the case"
      - name: officer_cluster
        description: "Officer cluster for categorization"
      - name: case_status
        description: "Current status of the case"
      - name: case_complexity
        description: "Complexity category for the case"
      - name: case_count
        description: "Number of cases matching the group dimensions"
      - name: currently_assigned_count
        description: "Number of cases currently assigned to the officer (no end date)"
      - name: case_disposition_date
        description: "Date of case disposition (if applicable)"
      - name: case_processing_days
        description: "Number of days between first mention date and case disposition date"

  - name: case_offence_distribution
    description: "Metric model for distribution of charges by offence group across cases"
    columns:
      - name: case_no
        description: "Case identifier"
      - name: offence_group
        description: "Offence group category for the charge"
      - name: case_status
        description: "Current status of the case"
      - name: case_type
        description: "Type/category of the case"
      - name: officer_cluster
        description: "Officer cluster for filtering"
      - name: first_mention_date
        description: "Date of first mention of the case in court"
      - name: last_court_event_date
        description: "Date of the last court event for the case"
      - name: case_count
        description: "Number of cases for the case and offence-group combination"

  - name: event_offence_hearing_days
    description: "Metric model for hearing days by court event, offence group, and officer"
    columns:
      - name: court_event_id
        description: "Court event identifier"
      - name: offence_group
        description: "Offence group associated with the case"
      - name: officer_id
        description: "Officer identifier attached to the court event"
      - name: court_event_type
        description: "Type of court event"
      - name: case_type
        description: "Type/category of the case"
      - name: case_status
        description: "Current status of the case"
      - name: officer_cluster
        description: "Officer cluster for filtering"
      - name: first_mention_date
        description: "Date of first mention of the case in court"
      - name: last_court_event_date
        description: "Date of the last court event for the case"
      - name: hearing_days
        description: "Number of hearing days attributed to the court event"
